<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>사진 맞추기 게임</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e17; --card: #221f35;
    --accent: #ff6b6b; --accent2: #ffd93d; --accent3: #6bcb77;
    --text: #fffffe; --muted: #a7a9be;
    --border: rgba(255,255,255,0.08); --radius: 16px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Noto Sans KR',sans-serif; min-height:100vh; overflow-x:hidden; }
  body::before { content:''; position:fixed; top:-200px; left:-200px; width:600px; height:600px; background:radial-gradient(circle,rgba(255,107,107,0.15) 0%,transparent 70%); pointer-events:none; }
  body::after  { content:''; position:fixed; bottom:-200px; right:-200px; width:500px; height:500px; background:radial-gradient(circle,rgba(107,203,119,0.1) 0%,transparent 70%); pointer-events:none; }

  .screen { display:none; }
  .screen.active { display:flex; flex-direction:column; min-height:100vh; }
  h1 { font-family:'Black Han Sans',sans-serif; font-size:clamp(2rem,6vw,3.5rem); letter-spacing:-1px; }

  .btn { display:inline-flex; align-items:center; justify-content:center; gap:8px; padding:14px 28px; border:none; border-radius:50px; cursor:pointer; font-family:'Noto Sans KR',sans-serif; font-size:1rem; font-weight:700; transition:transform 0.15s,box-shadow 0.15s; }
  .btn:hover { transform:translateY(-2px); }
  .btn:active { transform:translateY(0); }
  .btn-primary   { background:var(--accent);  color:#fff;    box-shadow:0 4px 20px rgba(255,107,107,0.4); }
  .btn-primary:hover { box-shadow:0 6px 28px rgba(255,107,107,0.6); }
  .btn-secondary { background:var(--card);    color:var(--text); border:1px solid var(--border); }
  .btn-yellow    { background:var(--accent2); color:#0f0e17; box-shadow:0 4px 20px rgba(255,217,61,0.4); }
  .btn-green     { background:var(--accent3); color:#0f0e17; box-shadow:0 4px 20px rgba(107,203,119,0.4); }
  .btn-sm   { padding:8px 18px; font-size:0.85rem; }
  .btn-danger { background:rgba(255,107,107,0.15); color:var(--accent); border:1px solid rgba(255,107,107,0.3); }
  .btn-danger:hover { background:rgba(255,107,107,0.25); }

  /* 배경 */
  .floating-icons { position:fixed; inset:0; pointer-events:none; overflow:hidden; z-index:0; }
  .fi { position:absolute; opacity:0.06; animation:floatUp linear infinite; }
  @keyframes floatUp { from{transform:translateY(110vh) rotate(0deg)} to{transform:translateY(-10vh) rotate(360deg)} }

  /* ══ 홈 ══ */
  #screen-home { align-items:center; justify-content:center; padding:40px 20px; text-align:center; gap:16px; }
  #screen-home .eyebrow { font-size:0.85rem; letter-spacing:4px; color:var(--accent); text-transform:uppercase; font-weight:700; }
  #screen-home h1 span { color:var(--accent); }
  #screen-home > p { color:var(--muted); font-size:1.05rem; max-width:420px; line-height:1.7; }
  .home-actions { display:flex; gap:12px; flex-wrap:wrap; justify-content:center; margin-top:8px; }

  /* ══ 목록 ══ */
  #screen-list { padding:40px 20px; gap:20px; align-items:center; }
  #screen-list h2 { font-family:'Black Han Sans',sans-serif; font-size:1.8rem; }
  #screen-list h2 span { color:var(--accent); }
  .list-wrap { width:100%; max-width:640px; display:flex; flex-direction:column; gap:12px; }
  .list-empty { text-align:center; padding:60px 20px; color:var(--muted); border:2px dashed var(--border); border-radius:var(--radius); }
  .list-empty .le-icon { font-size:3rem; margin-bottom:12px; }
  .game-card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:18px 20px; display:flex; align-items:center; gap:16px; animation:slideIn 0.25s ease; }
  @keyframes slideIn { from{opacity:0;transform:translateX(-12px)} to{opacity:1;transform:translateX(0)} }
  .game-card-thumbs { display:flex; gap:4px; flex-shrink:0; }
  .game-card-thumbs img { width:44px; height:44px; border-radius:8px; object-fit:cover; border:2px solid var(--border); }
  .game-card-thumbs img:nth-child(n+4) { display:none; }
  .game-card-info { flex:1; min-width:0; }
  .game-card-title { font-family:'Black Han Sans',sans-serif; font-size:1.1rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .game-card-meta { font-size:0.8rem; color:var(--muted); margin-top:4px; }
  .game-card-actions { display:flex; gap:8px; flex-shrink:0; flex-wrap:wrap; }

  /* ══ 빌더 ══ */
  #screen-builder { padding:40px 20px; gap:24px; align-items:center; }
  #screen-builder h2 { font-family:'Black Han Sans',sans-serif; font-size:1.8rem; }
  #screen-builder h2 span { color:var(--accent); }
  .builder-wrap { width:100%; max-width:700px; display:flex; flex-direction:column; gap:16px; }
  .title-input-wrap { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:16px 20px; display:flex; align-items:center; gap:12px; }
  .title-input-wrap label { font-size:0.85rem; color:var(--muted); font-weight:700; white-space:nowrap; }
  .title-input-wrap input { flex:1; background:transparent; border:none; outline:none; color:var(--text); font-family:'Noto Sans KR',sans-serif; font-size:1rem; font-weight:700; }
  .title-input-wrap input::placeholder { color:var(--muted); font-weight:400; }
  .drop-zone { border:2px dashed rgba(255,107,107,0.4); border-radius:var(--radius); padding:48px 24px; text-align:center; cursor:pointer; transition:border-color 0.2s,background 0.2s; background:rgba(255,107,107,0.03); }
  .drop-zone:hover,.drop-zone.drag-over { border-color:var(--accent); background:rgba(255,107,107,0.07); }
  .drop-zone .dz-icon { font-size:2.5rem; margin-bottom:10px; }
  .drop-zone p { color:var(--muted); font-size:0.95rem; }
  .drop-zone strong { color:var(--text); }
  #file-input { display:none; }
  .card-list { display:flex; flex-direction:column; gap:12px; }
  .photo-card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:14px 16px; display:flex; align-items:center; gap:14px; animation:slideIn 0.25s ease; }
  .photo-card .thumb { width:64px; height:64px; border-radius:10px; object-fit:cover; flex-shrink:0; border:2px solid var(--border); }
  .photo-card .info { flex:1; display:flex; flex-direction:column; gap:8px; }
  .photo-card .fname { font-size:0.78rem; color:var(--muted); }
  .photo-card input { background:rgba(255,255,255,0.06); border:1px solid var(--border); border-radius:8px; padding:8px 12px; color:var(--text); font-family:'Noto Sans KR',sans-serif; font-size:0.95rem; outline:none; transition:border-color 0.2s; width:100%; }
  .photo-card input:focus { border-color:var(--accent); }
  .photo-card input::placeholder { color:var(--muted); }
  .photo-card .del-btn { background:none; border:none; color:var(--muted); font-size:1.2rem; cursor:pointer; padding:4px; transition:color 0.15s; flex-shrink:0; }
  .photo-card .del-btn:hover { color:var(--accent); }
  .storage-bar-wrap { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:12px 16px; display:flex; flex-direction:column; gap:6px; }
  .storage-bar-label { font-size:0.8rem; color:var(--muted); display:flex; justify-content:space-between; }
  .storage-bar-bg { height:6px; background:rgba(255,255,255,0.08); border-radius:4px; overflow:hidden; }
  .storage-bar-fill { height:100%; border-radius:4px; transition:width 0.4s,background 0.4s; background:var(--accent3); }
  .storage-bar-fill.warn { background:var(--accent2); }
  .storage-bar-fill.danger { background:var(--accent); }
  .builder-footer { width:100%; max-width:700px; display:flex; gap:12px; justify-content:flex-end; flex-wrap:wrap; }

  /* ══ 게임 ══ */
  #screen-game { padding:24px 20px; gap:20px; align-items:center; }
  .game-header { width:100%; max-width:560px; display:flex; align-items:center; justify-content:space-between; }
  .progress-text { font-family:'Black Han Sans',sans-serif; font-size:1.1rem; color:var(--muted); }
  .progress-text span { color:var(--text); font-size:1.4rem; }

  /* 게임 canvas 박스 */
  .image-box {
    width:100%; max-width:560px; aspect-ratio:1/1;
    border-radius:20px; overflow:hidden;
    position:relative; border:2px solid var(--border); background:var(--card);
  }
  .image-box canvas {
    width:100%; height:100%; display:block;
    border-radius:20px;
  }

  /* 정답 배너 */
  .answer-banner { width:100%; max-width:560px; background:var(--card); border:1px solid rgba(255,217,61,0.3); border-radius:14px; padding:16px 24px; text-align:center; display:none; animation:fadeSlideUp 0.4s ease; }
  .answer-banner.visible { display:block; }
  @keyframes fadeSlideUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  .answer-banner .ab-label { font-size:0.78rem; letter-spacing:3px; color:var(--muted); text-transform:uppercase; font-weight:700; margin-bottom:6px; }
  .answer-banner .ab-answer { font-family:'Black Han Sans',sans-serif; font-size:1.8rem; color:var(--accent2); }

  /* 힌트 버튼 */
  .hint-row { width:100%; max-width:560px; display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }
  .hint-btn { background:var(--card); border:1px solid var(--border); border-radius:50px; padding:10px 22px; color:var(--muted); font-size:0.9rem; font-weight:700; cursor:pointer; transition:all 0.2s; font-family:'Noto Sans KR',sans-serif; }
  .hint-btn:hover:not(:disabled) { border-color:var(--accent2); color:var(--accent2); }
  .hint-btn:disabled { opacity:0.35; cursor:not-allowed; }
  .hint-btn.used { border-color:var(--accent2); color:var(--accent2); }
  .hint-btn.reveal { background:var(--accent2); color:#0f0e17; border-color:var(--accent2); box-shadow:0 4px 16px rgba(255,217,61,0.35); }
  .hint-btn.reveal:hover:not(:disabled) { box-shadow:0 6px 24px rgba(255,217,61,0.55); }
  .next-row { width:100%; max-width:560px; display:flex; justify-content:center; }

  /* ══ 전체보기 모달 ══ */
  .reveal-modal { display:none; position:fixed; inset:0; z-index:100; background:rgba(0,0,0,0.96); flex-direction:column; align-items:center; justify-content:center; gap:14px; padding:16px 20px 24px; }
  .reveal-modal.open { display:flex; }
  .reveal-modal .modal-close { position:absolute; top:20px; right:24px; background:none; border:none; color:var(--muted); font-size:1.8rem; cursor:pointer; line-height:1; }
  .reveal-modal .modal-close:hover { color:var(--text); }
  /* 모달 canvas: 화면 꽉 채우되 비율 유지 */
  .reveal-modal .modal-canvas-wrap { flex:1; min-height:0; width:100%; display:flex; align-items:center; justify-content:center; }
  .reveal-modal canvas { display:block; border-radius:12px; /* JS에서 크기 결정 */ }
  .reveal-modal .modal-answer { font-family:'Black Han Sans',sans-serif; font-size:2rem; color:var(--accent2); text-align:center; }
  .reveal-modal .modal-label { font-size:0.78rem; letter-spacing:3px; color:var(--muted); text-transform:uppercase; font-weight:700; }

  /* ══ 결과 ══ */
  #screen-result { align-items:center; justify-content:center; padding:40px 20px; text-align:center; gap:20px; }
  .result-emoji { font-size:4rem; }
  #screen-result h2 { font-family:'Black Han Sans',sans-serif; font-size:2.2rem; }
  #screen-result p { color:var(--muted); font-size:1rem; line-height:1.7; max-width:380px; }
  #screen-result .actions { display:flex; gap:12px; flex-wrap:wrap; justify-content:center; }

  /* 토스트 */
  .toast { position:fixed; bottom:30px; left:50%; transform:translateX(-50%) translateY(20px); background:#2a2740; border:1px solid var(--border); border-radius:50px; padding:12px 24px; font-size:0.9rem; font-weight:700; opacity:0; transition:opacity 0.3s,transform 0.3s; pointer-events:none; z-index:999; white-space:nowrap; }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
  .toast.success { border-color:rgba(107,203,119,0.5); color:var(--accent3); }
  .toast.error   { border-color:rgba(255,107,107,0.5); color:var(--accent); }

  @media (max-width:480px) {
    .photo-card { flex-wrap:wrap; }
    .photo-card .thumb { width:100%; height:160px; border-radius:10px; }
    .game-card { flex-wrap:wrap; }
    .game-card-actions { width:100%; justify-content:flex-end; }
  }
</style>
</head>
<body>

<div class="floating-icons" id="floatingIcons"></div>
<div class="toast" id="toast"></div>

<!-- 홈 -->
<div id="screen-home" class="screen active">
  <p class="eyebrow">Photo Quiz Game</p>
  <h1>사진 보고<br><span>맞춰보세요!</span></h1>
  <p>사진을 업로드하고 정답을 입력하면<br>나만의 맞추기 게임이 완성돼요.</p>
  <div class="home-actions">
    <button class="btn btn-primary"   onclick="goTo('list')">🗂 내 게임 목록</button>
    <button class="btn btn-secondary" onclick="newGame()">➕ 새 게임 만들기</button>
  </div>
</div>

<!-- 목록 -->
<div id="screen-list" class="screen">
  <h2>내 <span>게임</span> 목록</h2>
  <div class="list-wrap" id="gameList"></div>
  <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center;">
    <button class="btn btn-primary"   onclick="newGame()">➕ 새 게임 만들기</button>
    <button class="btn btn-secondary" onclick="goTo('home')">← 홈으로</button>
  </div>
</div>

<!-- 빌더 -->
<div id="screen-builder" class="screen">
  <h2>게임 <span>만들기</span></h2>
  <div class="builder-wrap">
    <div class="title-input-wrap">
      <label>제목</label>
      <input type="text" id="gameTitle" placeholder="예: 디저트 맞추기" maxlength="30">
    </div>
    <div class="drop-zone" id="dropZone">
      <div class="dz-icon">📸</div>
      <p><strong>클릭하거나 사진을 끌어다 놓으세요</strong><br>JPG, PNG, GIF, WEBP · 여러 장 한 번에 가능</p>
    </div>
    <input type="file" id="file-input" accept="image/*" multiple>
    <div class="card-list" id="cardList"></div>
    <div class="storage-bar-wrap" id="storageWrap" style="display:none">
      <div class="storage-bar-label"><span>브라우저 저장 용량</span><span id="storageText">0 / 5 MB</span></div>
      <div class="storage-bar-bg"><div class="storage-bar-fill" id="storageBar" style="width:0%"></div></div>
    </div>
  </div>
  <div class="builder-footer">
    <button class="btn btn-secondary" onclick="goTo('list')">← 목록으로</button>
    <button class="btn btn-green"     id="saveBtn"  onclick="saveGame()"  disabled>💾 저장</button>
    <button class="btn btn-primary"   id="startBtn" onclick="startGame()" disabled>▶ 바로 시작</button>
  </div>
</div>

<!-- 게임 -->
<div id="screen-game" class="screen">
  <div class="game-header">
    <div class="progress-text"><span id="qNum">1</span> / <span id="qTotal">?</span></div>
    <button class="btn btn-secondary btn-sm" onclick="goTo('list')">🗂 목록</button>
  </div>
  <div class="image-box" id="imageBox">
    <canvas id="gameCanvas"></canvas>
  </div>
  <div class="answer-banner" id="answerBanner">
    <div class="ab-label">정답</div>
    <div class="ab-answer" id="answerText"></div>
  </div>
  <div class="hint-row">
    <button class="hint-btn"        id="hint1" onclick="useHint(1)">조금 더 보기</button>
    <button class="hint-btn"        id="hint2" onclick="useHint(2)" disabled>더 보기</button>
    <button class="hint-btn reveal" id="hint3" onclick="useHint(3)">🔍 전체 보기</button>
  </div>
  <div class="next-row">
    <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()" style="display:none">다음 →</button>
  </div>
</div>

<!-- 결과 -->
<div id="screen-result" class="screen">
  <div class="result-emoji">🎉</div>
  <h2>모두 봤어요!</h2>
  <p id="resultMsg"></p>
  <div class="actions">
    <button class="btn btn-yellow"    onclick="restartGame()">🔄 다시 보기</button>
    <button class="btn btn-secondary" onclick="goTo('list')">🗂 목록으로</button>
    <button class="btn btn-secondary" onclick="goTo('home')">🏠 홈으로</button>
  </div>
</div>

<!-- 전체보기 모달 -->
<div class="reveal-modal" id="revealModal" onclick="closeRevealModal(event)">
  <button class="modal-close" onclick="closeModal()">✕</button>
  <div class="modal-canvas-wrap" id="modalCanvasWrap">
    <canvas id="modalCanvas"></canvas>
  </div>
  <div class="modal-label">정답</div>
  <div class="modal-answer" id="modalAnswer"></div>
  <button class="btn btn-primary" id="modalNextBtn" onclick="closeModalAndNext()">다음 →</button>
</div>

<script>
/* ════════════════════════════════════
   상태
════════════════════════════════════ */
let items    = [];
let queue    = [];
let cur      = 0;
let revealed = false;
let editingId = null;

// 현재 로드된 이미지 객체 (canvas 재드로우용)
let currentImage = null;

// 줌 단계
const ZOOM_LEVELS = [5.5, 3.0, 1.8, 1.0];
let currentZoom = ZOOM_LEVELS[0];
let zoomOffsetX = 0, zoomOffsetY = 0;

const LS_KEY = 'photoQuizGames';

/* ════════════════════════════════════
   화면 전환
════════════════════════════════════ */
function goTo(screen) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + screen).classList.add('active');
  window.scrollTo(0, 0);
  if (screen === 'list') renderList();
}

/* ════════════════════════════════════
   배경 이모지
════════════════════════════════════ */
(function(){
  const icons=['📸','🎯','🌟','🎪','🦋','🍀','✨','🎨','🔍','💡'];
  const wrap=document.getElementById('floatingIcons');
  for(let i=0;i<18;i++){
    const el=document.createElement('div');
    el.className='fi';
    el.textContent=icons[Math.floor(Math.random()*icons.length)];
    el.style.left=Math.random()*100+'vw';
    el.style.animationDuration=(12+Math.random()*16)+'s';
    el.style.animationDelay=-(Math.random()*20)+'s';
    el.style.fontSize=(1.2+Math.random()*1.8)+'rem';
    wrap.appendChild(el);
  }
})();

/* ════════════════════════════════════
   토스트
════════════════════════════════════ */
let toastTimer;
function showToast(msg,type='success'){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast '+type+' show';
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),2400);
}

/* ════════════════════════════════════
   Canvas 드로우 핵심 함수
   - img: HTMLImageElement (원본)
   - canvas: 대상 캔버스
   - zoom: 배율 (1.0 = 전체, 5.5 = 최대 확대)
   - ox, oy: 확대 중심 오프셋 (-0.5~0.5, 비율)
   - contain: true면 전체 이미지를 캔버스 안에 맞춤 (전체보기용)
════════════════════════════════════ */
function drawToCanvas(img, canvas, zoom, ox, oy, contain=false) {
  const dpr = window.devicePixelRatio || 1;

  // CSS 표시 크기 (canvas 부모 기준)
  const cssW = canvas.parentElement.clientWidth  || 560;
  const cssH = canvas.parentElement.clientHeight || cssW;

  // 물리 픽셀 크기 설정 (DPR 반영)
  canvas.width  = Math.round(cssW * dpr);
  canvas.height = Math.round(cssH * dpr);
  canvas.style.width  = cssW + 'px';
  canvas.style.height = cssH + 'px';

  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const cw = canvas.width;
  const ch = canvas.height;
  const iw = img.naturalWidth;
  const ih = img.naturalHeight;

  if (contain) {
    // 전체보기: 이미지 전체가 캔버스 안에 들어오도록 (letterbox)
    const scale = Math.min(cw / iw, ch / ih);
    const dw = iw * scale;
    const dh = ih * scale;
    const dx = (cw - dw) / 2;
    const dy = (ch - dh) / 2;
    ctx.drawImage(img, 0, 0, iw, ih, dx, dy, dw, dh);
  } else {
    // 확대 보기: 이미지의 일부분만 잘라서 그리기 (crop + draw)
    // cover 기준 스케일 (캔버스를 꽉 채우는 최소 배율)
    const coverScale = Math.max(cw / iw, ch / ih);

    // zoom 배율 적용 시 소스에서 잘라낼 크기
    // zoom이 클수록 소스를 더 작게 잘라냄 → 확대 효과
    const srcW = cw / (coverScale * zoom);
    const srcH = ch / (coverScale * zoom);

    // 중심 좌표 (ox, oy는 -0.5~0.5 범위의 오프셋)
    const cx = iw / 2 + ox * iw;
    const cy = ih / 2 + oy * ih;

    // 소스 영역 (이미지 범위 클램프)
    const sx = Math.max(0, Math.min(iw - srcW, cx - srcW / 2));
    const sy = Math.max(0, Math.min(ih - srcH, cy - srcH / 2));

    ctx.drawImage(img, sx, sy, srcW, srcH, 0, 0, cw, ch);
  }
}

/* ════════════════════════════════════
   LocalStorage
════════════════════════════════════ */
function loadGames(){
  try{ return JSON.parse(localStorage.getItem(LS_KEY))||[]; }catch{ return []; }
}
function saveGames(games){
  try{ localStorage.setItem(LS_KEY,JSON.stringify(games)); return true; }
  catch(e){ if(e.name==='QuotaExceededError') showToast('💾 저장 용량 초과. 오래된 게임을 삭제해주세요.','error'); return false; }
}
function getStorageUsed(){
  let t=0; for(let k in localStorage) if(localStorage.hasOwnProperty(k)) t+=localStorage[k].length*2; return t;
}

/* ════════════════════════════════════
   목록
════════════════════════════════════ */
function renderList(){
  const games=loadGames();
  const wrap=document.getElementById('gameList');
  wrap.innerHTML='';
  if(games.length===0){
    wrap.innerHTML=`<div class="list-empty"><div class="le-icon">🎮</div><p>저장된 게임이 없어요.<br>새 게임을 만들어보세요!</p></div>`;
    return;
  }
  games.forEach(g=>{
    const card=document.createElement('div');
    card.className='game-card';
    const thumbsHtml=g.items.slice(0,3).map(it=>`<img src="${it.url}" alt="">`).join('');
    const dateStr=new Date(g.savedAt).toLocaleDateString('ko-KR');
    card.innerHTML=`
      <div class="game-card-thumbs">${thumbsHtml}</div>
      <div class="game-card-info">
        <div class="game-card-title">${g.title}</div>
        <div class="game-card-meta">${g.items.length}장 · ${dateStr}</div>
      </div>
      <div class="game-card-actions">
        <button class="btn btn-primary btn-sm"   onclick="playGame('${g.id}')">▶ 플레이</button>
        <button class="btn btn-secondary btn-sm" onclick="editGame('${g.id}')">✏️</button>
        <button class="btn btn-danger btn-sm"    onclick="deleteGame('${g.id}')">🗑</button>
      </div>`;
    wrap.appendChild(card);
  });
}

/* ════════════════════════════════════
   저장 / 수정 / 삭제 / 플레이
════════════════════════════════════ */
function saveGame(){
  const title=document.getElementById('gameTitle').value.trim();
  if(!title){ showToast('게임 제목을 입력해주세요!','error'); return; }
  if(!items.length){ showToast('사진을 추가해주세요!','error'); return; }
  if(!items.every(it=>it.answer.trim())){ showToast('모든 사진에 정답을 입력해주세요!','error'); return; }
  const games=loadGames();
  const gameData={ id:editingId||Date.now().toString(), title, items:items.map(it=>({url:it.url,answer:it.answer,name:it.name||''})), savedAt:Date.now() };
  if(editingId){ const idx=games.findIndex(g=>g.id===editingId); if(idx!==-1) games[idx]=gameData; else games.push(gameData); }
  else{ games.push(gameData); editingId=gameData.id; }
  if(saveGames(games)){ showToast('✅ 저장됐어요!'); updateStorageBar(); }
}

function newGame(){
  editingId=null; items=[];
  document.getElementById('gameTitle').value='';
  document.getElementById('cardList').innerHTML='';
  document.getElementById('storageWrap').style.display='none';
  checkBtns(); goTo('builder');
}

function editGame(id){
  const g=loadGames().find(g=>g.id===id); if(!g) return;
  editingId=id; items=g.items.map(it=>({url:it.url,answer:it.answer,name:it.name||''}));
  document.getElementById('gameTitle').value=g.title;
  document.getElementById('cardList').innerHTML='';
  items.forEach((it,i)=>renderCard(it,i));
  checkBtns(); updateStorageBar(); goTo('builder');
}

function deleteGame(id){
  if(!confirm('이 게임을 삭제할까요?')) return;
  saveGames(loadGames().filter(g=>g.id!==id));
  renderList(); showToast('🗑 삭제됐어요.');
}

function playGame(id){
  const g=loadGames().find(g=>g.id===id); if(!g) return;
  editingId=id; items=g.items.map(it=>({url:it.url,answer:it.answer,name:it.name||''}));
  document.getElementById('gameTitle').value=g.title;
  startGame();
}

/* ════════════════════════════════════
   파일 업로드
════════════════════════════════════ */
const dropZone=document.getElementById('dropZone');
const fileInput=document.getElementById('file-input');
dropZone.addEventListener('click',()=>fileInput.click());
dropZone.addEventListener('dragover',e=>{e.preventDefault();dropZone.classList.add('drag-over');});
dropZone.addEventListener('dragleave',()=>dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop',e=>{e.preventDefault();dropZone.classList.remove('drag-over');handleFiles(e.dataTransfer.files);});
fileInput.addEventListener('change',()=>{handleFiles(fileInput.files);fileInput.value='';});

function handleFiles(files){
  Array.from(files).forEach(file=>{
    if(!file.type.startsWith('image/')) return;
    const reader=new FileReader();
    reader.onload=e=>{
      items.push({url:e.target.result,answer:'',name:file.name});
      renderCard(items[items.length-1],items.length-1);
      checkBtns(); updateStorageBar();
    };
    reader.readAsDataURL(file);
  });
}

function renderCard(item,idx){
  const list=document.getElementById('cardList');
  const card=document.createElement('div');
  card.className='photo-card'; card.id='card-'+idx;
  card.innerHTML=`
    <img class="thumb" src="${item.url}" alt="">
    <div class="info">
      <div class="fname">${item.name||'사진 '+(idx+1)}</div>
      <input type="text" placeholder="이 사진의 정답은? (예: 마카롱)"
             value="${item.answer}" oninput="items[${idx}].answer=this.value;checkBtns()">
    </div>
    <button class="del-btn" onclick="removeItem(${idx})" title="삭제">✕</button>`;
  list.appendChild(card);
}

function removeItem(idx){
  items.splice(idx,1);
  document.getElementById('cardList').innerHTML='';
  items.forEach((it,i)=>renderCard(it,i));
  checkBtns(); updateStorageBar();
}

function checkBtns(){
  const ok=items.length>0&&items.every(it=>it.answer.trim()!=='');
  const hasTitle=document.getElementById('gameTitle').value.trim()!=='';
  document.getElementById('startBtn').disabled=!ok;
  document.getElementById('saveBtn').disabled=!(ok&&hasTitle);
}
document.getElementById('gameTitle').addEventListener('input',checkBtns);

function updateStorageBar(){
  if(!items.length){document.getElementById('storageWrap').style.display='none';return;}
  document.getElementById('storageWrap').style.display='block';
  const used=getStorageUsed(), max=5*1024*1024, pct=Math.min(100,(used/max)*100);
  document.getElementById('storageText').textContent=`${(used/1024/1024).toFixed(1)} / 5 MB`;
  const bar=document.getElementById('storageBar');
  bar.style.width=pct+'%';
  bar.className='storage-bar-fill'+(pct>85?' danger':pct>65?' warn':'');
}

/* ════════════════════════════════════
   게임 시작 / 재시작
════════════════════════════════════ */
function startGame(){
  queue=items.map((_,i)=>i); shuffle(queue);
  cur=0; document.getElementById('qTotal').textContent=queue.length;
  goTo('game'); loadQuestion();
}

function restartGame(){
  shuffle(queue); cur=0; goTo('game'); loadQuestion();
}

/* ════════════════════════════════════
   문제 로드
════════════════════════════════════ */
function loadQuestion(){
  revealed=false;
  const item=items[queue[cur]];

  document.getElementById('qNum').textContent=cur+1;
  document.getElementById('answerBanner').classList.remove('visible');
  document.getElementById('nextBtn').style.display='none';
  document.getElementById('revealModal').classList.remove('open');

  // 랜덤 오프셋 (-0.15 ~ +0.15 비율)
  zoomOffsetX=(Math.random()-0.5)*0.3;
  zoomOffsetY=(Math.random()-0.5)*0.3;
  currentZoom=ZOOM_LEVELS[0];

  // 힌트 버튼 초기화
  document.getElementById('hint1').disabled=false;  document.getElementById('hint1').classList.remove('used');
  document.getElementById('hint2').disabled=true;   document.getElementById('hint2').classList.remove('used');
  document.getElementById('hint3').disabled=false;  document.getElementById('hint3').classList.remove('used');

  // 이미지 로드 후 canvas에 그리기
  const img=new Image();
  img.onload=()=>{
    currentImage=img;
    drawToCanvas(img, document.getElementById('gameCanvas'), currentZoom, zoomOffsetX, zoomOffsetY, false);
  };
  img.src=item.url;
}

/* ════════════════════════════════════
   힌트 (줌아웃 → canvas 재드로우)
════════════════════════════════════ */
function useHint(level){
  if(level===3&&revealed) return;
  currentZoom=ZOOM_LEVELS[level];

  if(level===3){
    openRevealModal();
  } else {
    drawToCanvas(currentImage, document.getElementById('gameCanvas'), currentZoom, zoomOffsetX, zoomOffsetY, false);
  }

  document.getElementById('hint'+level).classList.add('used');
  document.getElementById('hint'+level).disabled=true;
  if(level<3){
    document.getElementById('hint'+(level+1)).disabled=false;
    document.getElementById('hint3').disabled=false;
  }
}

/* ════════════════════════════════════
   전체보기 모달 (canvas로 원본 화질)
════════════════════════════════════ */
function openRevealModal(){
  const modal=document.getElementById('revealModal');
  const wrap=document.getElementById('modalCanvasWrap');
  const canvas=document.getElementById('modalCanvas');
  const dpr=window.devicePixelRatio||1;

  // 모달 canvas 크기: 뷰포트 대부분 사용
  const availW=window.innerWidth  * 0.94;
  const availH=(window.innerHeight - 160) * 0.94; // 정답 텍스트 + 버튼 공간 제외

  const iw=currentImage.naturalWidth;
  const ih=currentImage.naturalHeight;

  // 이미지 비율 유지하면서 가용 공간에 맞추기
  // 가용 공간을 꽉 채우도록 (원본보다 크게 늘려도 됨)
  const scale = Math.min(availW / iw, availH / ih);
  const cssW = Math.round(iw * scale);
  const cssH = Math.round(ih * scale);

  canvas.style.width  = cssW + 'px';
  canvas.style.height = cssH + 'px';
  canvas.width  = Math.round(cssW * dpr);
  canvas.height = Math.round(cssH * dpr);

  const ctx = canvas.getContext('2d');
  ctx.drawImage(currentImage, 0, 0, canvas.width, canvas.height);

  document.getElementById('modalAnswer').textContent=items[queue[cur]].answer;
  const isLast=cur>=queue.length-1;
  document.getElementById('modalNextBtn').textContent=isLast?'결과 보기 🎉':'다음 →';
  modal.classList.add('open');
  revealAnswer();
}

function revealAnswer(){
  revealed=true;
  ['hint1','hint2','hint3'].forEach(id=>document.getElementById(id).disabled=true);
  document.getElementById('answerText').textContent=items[queue[cur]].answer;
  document.getElementById('answerBanner').classList.add('visible');
  const nextBtn=document.getElementById('nextBtn');
  nextBtn.textContent=cur>=queue.length-1?'결과 보기 🎉':'다음 →';
  nextBtn.style.display='none';
}

function closeModal(){
  document.getElementById('revealModal').classList.remove('open');
  if(revealed) document.getElementById('nextBtn').style.display='inline-flex';
}

function closeRevealModal(e){
  if(e.target===document.getElementById('revealModal')) closeModal();
}

function closeModalAndNext(){
  closeModal(); nextQuestion();
}

/* ════════════════════════════════════
   다음 / 결과
════════════════════════════════════ */
function nextQuestion(){
  cur++;
  if(cur>=queue.length) showResult();
  else loadQuestion();
}

function showResult(){
  goTo('result');
  document.getElementById('resultMsg').textContent=`${queue.length}장의 사진을 모두 확인했어요!`;
}

/* ════════════════════════════════════
   유틸
════════════════════════════════════ */
function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
}

// 창 크기 바뀌면 게임 canvas 다시 그리기
window.addEventListener('resize',()=>{
  if(currentImage && document.getElementById('screen-game').classList.contains('active')){
    drawToCanvas(currentImage, document.getElementById('gameCanvas'), currentZoom, zoomOffsetX, zoomOffsetY, false);
  }
});
</script>
