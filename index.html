<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>사진 맞추기 게임</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e17;
    --card: #221f35;
    --accent: #ff6b6b;
    --accent2: #ffd93d;
    --accent3: #6bcb77;
    --text: #fffffe;
    --muted: #a7a9be;
    --border: rgba(255,255,255,0.08);
    --radius: 16px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh; overflow-x: hidden;
  }
  body::before {
    content:''; position:fixed; top:-200px; left:-200px;
    width:600px; height:600px;
    background:radial-gradient(circle,rgba(255,107,107,0.15) 0%,transparent 70%);
    pointer-events:none;
  }
  body::after {
    content:''; position:fixed; bottom:-200px; right:-200px;
    width:500px; height:500px;
    background:radial-gradient(circle,rgba(107,203,119,0.1) 0%,transparent 70%);
    pointer-events:none;
  }
  .screen { display:none; }
  .screen.active { display:flex; flex-direction:column; min-height:100vh; }
  h1 { font-family:'Black Han Sans',sans-serif; font-size:clamp(2rem,6vw,3.5rem); letter-spacing:-1px; }

  .btn {
    display:inline-flex; align-items:center; justify-content:center; gap:8px;
    padding:14px 28px; border:none; border-radius:50px; cursor:pointer;
    font-family:'Noto Sans KR',sans-serif; font-size:1rem; font-weight:700;
    transition:transform 0.15s,box-shadow 0.15s;
  }
  .btn:hover { transform:translateY(-2px); }
  .btn:active { transform:translateY(0); }
  .btn-primary { background:var(--accent); color:#fff; box-shadow:0 4px 20px rgba(255,107,107,0.4); }
  .btn-primary:hover { box-shadow:0 6px 28px rgba(255,107,107,0.6); }
  .btn-secondary { background:var(--card); color:var(--text); border:1px solid var(--border); }
  .btn-yellow { background:var(--accent2); color:#0f0e17; box-shadow:0 4px 20px rgba(255,217,61,0.4); }
  .btn-green  { background:var(--accent3); color:#0f0e17; box-shadow:0 4px 20px rgba(107,203,119,0.4); }
  .btn-sm { padding:8px 18px; font-size:0.85rem; }
  .btn-danger { background:rgba(255,107,107,0.15); color:var(--accent); border:1px solid rgba(255,107,107,0.3); }
  .btn-danger:hover { background:rgba(255,107,107,0.25); }

  /* 떠다니는 배경 */
  .floating-icons { position:fixed; inset:0; pointer-events:none; overflow:hidden; z-index:0; }
  .fi { position:absolute; opacity:0.06; animation:floatUp linear infinite; }
  @keyframes floatUp {
    from { transform:translateY(110vh) rotate(0deg); }
    to   { transform:translateY(-10vh) rotate(360deg); }
  }

  /* ══ SCREEN: 홈 ══ */
  #screen-home {
    align-items:center; justify-content:center;
    padding:40px 20px; text-align:center; gap:16px;
  }
  #screen-home .eyebrow {
    font-size:0.85rem; letter-spacing:4px; color:var(--accent);
    text-transform:uppercase; font-weight:700;
  }
  #screen-home h1 span { color:var(--accent); }
  #screen-home > p { color:var(--muted); font-size:1.05rem; max-width:420px; line-height:1.7; }
  .home-actions { display:flex; gap:12px; flex-wrap:wrap; justify-content:center; margin-top:8px; }

  /* ══ SCREEN: 목록 ══ */
  #screen-list { padding:40px 20px; gap:20px; align-items:center; }
  #screen-list h2 { font-family:'Black Han Sans',sans-serif; font-size:1.8rem; }
  #screen-list h2 span { color:var(--accent); }
  .list-wrap { width:100%; max-width:640px; display:flex; flex-direction:column; gap:12px; }
  .list-empty {
    text-align:center; padding:60px 20px; color:var(--muted);
    border:2px dashed var(--border); border-radius:var(--radius);
  }
  .list-empty .le-icon { font-size:3rem; margin-bottom:12px; }

  .game-card {
    background:var(--card); border:1px solid var(--border);
    border-radius:var(--radius); padding:18px 20px;
    display:flex; align-items:center; gap:16px;
    animation:slideIn 0.25s ease;
  }
  @keyframes slideIn {
    from { opacity:0; transform:translateX(-12px); }
    to   { opacity:1; transform:translateX(0); }
  }
  .game-card-thumbs {
    display:flex; gap:4px; flex-shrink:0;
  }
  .game-card-thumbs img {
    width:44px; height:44px; border-radius:8px; object-fit:cover;
    border:2px solid var(--border);
  }
  .game-card-thumbs img:nth-child(n+4) { display:none; }
  .game-card-info { flex:1; min-width:0; }
  .game-card-title {
    font-family:'Black Han Sans',sans-serif; font-size:1.1rem;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .game-card-meta { font-size:0.8rem; color:var(--muted); margin-top:4px; }
  .game-card-actions { display:flex; gap:8px; flex-shrink:0; flex-wrap:wrap; }

  /* ══ SCREEN: 빌더 ══ */
  #screen-builder { padding:40px 20px; gap:24px; align-items:center; }
  #screen-builder h2 { font-family:'Black Han Sans',sans-serif; font-size:1.8rem; }
  #screen-builder h2 span { color:var(--accent); }
  .builder-wrap { width:100%; max-width:700px; display:flex; flex-direction:column; gap:16px; }

  .title-input-wrap {
    background:var(--card); border:1px solid var(--border);
    border-radius:var(--radius); padding:16px 20px;
    display:flex; align-items:center; gap:12px;
  }
  .title-input-wrap label { font-size:0.85rem; color:var(--muted); font-weight:700; white-space:nowrap; }
  .title-input-wrap input {
    flex:1; background:transparent; border:none; outline:none;
    color:var(--text); font-family:'Noto Sans KR',sans-serif;
    font-size:1rem; font-weight:700;
  }
  .title-input-wrap input::placeholder { color:var(--muted); font-weight:400; }

  .drop-zone {
    border:2px dashed rgba(255,107,107,0.4);
    border-radius:var(--radius); padding:48px 24px; text-align:center; cursor:pointer;
    transition:border-color 0.2s,background 0.2s; background:rgba(255,107,107,0.03);
  }
  .drop-zone:hover,.drop-zone.drag-over { border-color:var(--accent); background:rgba(255,107,107,0.07); }
  .drop-zone .dz-icon { font-size:2.5rem; margin-bottom:10px; }
  .drop-zone p { color:var(--muted); font-size:0.95rem; }
  .drop-zone strong { color:var(--text); }
  #file-input { display:none; }

  .card-list { display:flex; flex-direction:column; gap:12px; }
  .photo-card {
    background:var(--card); border:1px solid var(--border);
    border-radius:var(--radius); padding:14px 16px;
    display:flex; align-items:center; gap:14px; animation:slideIn 0.25s ease;
  }
  .photo-card .thumb {
    width:64px; height:64px; border-radius:10px; object-fit:cover;
    flex-shrink:0; border:2px solid var(--border);
  }
  .photo-card .info { flex:1; display:flex; flex-direction:column; gap:8px; }
  .photo-card .fname { font-size:0.78rem; color:var(--muted); }
  .photo-card input {
    background:rgba(255,255,255,0.06); border:1px solid var(--border);
    border-radius:8px; padding:8px 12px; color:var(--text);
    font-family:'Noto Sans KR',sans-serif; font-size:0.95rem;
    outline:none; transition:border-color 0.2s; width:100%;
  }
  .photo-card input:focus { border-color:var(--accent); }
  .photo-card input::placeholder { color:var(--muted); }
  .photo-card .del-btn {
    background:none; border:none; color:var(--muted);
    font-size:1.2rem; cursor:pointer; padding:4px;
    transition:color 0.15s; flex-shrink:0;
  }
  .photo-card .del-btn:hover { color:var(--accent); }

  /* 용량 경고 */
  .storage-bar-wrap {
    background:var(--card); border:1px solid var(--border);
    border-radius:12px; padding:12px 16px; display:flex; flex-direction:column; gap:6px;
  }
  .storage-bar-label { font-size:0.8rem; color:var(--muted); display:flex; justify-content:space-between; }
  .storage-bar-bg { height:6px; background:rgba(255,255,255,0.08); border-radius:4px; overflow:hidden; }
  .storage-bar-fill { height:100%; border-radius:4px; transition:width 0.4s,background 0.4s; background:var(--accent3); }
  .storage-bar-fill.warn { background:var(--accent2); }
  .storage-bar-fill.danger { background:var(--accent); }

  .builder-footer {
    width:100%; max-width:700px;
    display:flex; gap:12px; justify-content:flex-end; flex-wrap:wrap;
  }

  /* ══ SCREEN: 게임 ══ */
  #screen-game { padding:24px 20px; gap:20px; align-items:center; }
  .game-header {
    width:100%; max-width:500px;
    display:flex; align-items:center; justify-content:space-between;
  }
  .progress-text { font-family:'Black Han Sans',sans-serif; font-size:1.1rem; color:var(--muted); }
  .progress-text span { color:var(--text); font-size:1.4rem; }

  .image-box {
    width:100%; max-width:500px; aspect-ratio:1/1;
    border-radius:20px; overflow:hidden;
    position:relative; border:2px solid var(--border); background:var(--card);
  }
  /* 이미지를 절대 배치 + 원본 해상도 유지: scale 확대 시 실제 고화질 픽셀 그대로 사용 */
  .image-box img {
    position:absolute;
    top:50%; left:50%;
    width:auto; height:auto;
    min-width:100%; min-height:100%;
    max-width:none;
    transform-origin:50% 50%;
    translate:-50% -50%;
    transition:transform 0.9s cubic-bezier(0.4,0,0.2,1);
    display:block;
    object-fit:cover;
  }

  .answer-banner {
    width:100%; max-width:500px;
    background:var(--card); border:1px solid rgba(255,217,61,0.3);
    border-radius:14px; padding:16px 24px;
    text-align:center; display:none; animation:fadeSlideUp 0.4s ease;
  }
  .answer-banner.visible { display:block; }
  @keyframes fadeSlideUp {
    from { opacity:0; transform:translateY(10px); }
    to   { opacity:1; transform:translateY(0); }
  }
  .answer-banner .ab-label {
    font-size:0.78rem; letter-spacing:3px; color:var(--muted);
    text-transform:uppercase; font-weight:700; margin-bottom:6px;
  }
  .answer-banner .ab-answer {
    font-family:'Black Han Sans',sans-serif; font-size:1.8rem;
    color:var(--accent2); letter-spacing:-0.5px;
  }

  .hint-row {
    width:100%; max-width:500px;
    display:flex; gap:10px; justify-content:center; flex-wrap:wrap;
  }
  .hint-btn {
    background:var(--card); border:1px solid var(--border);
    border-radius:50px; padding:10px 22px;
    color:var(--muted); font-size:0.9rem; font-weight:700;
    cursor:pointer; transition:all 0.2s; font-family:'Noto Sans KR',sans-serif;
  }
  .hint-btn:hover:not(:disabled) { border-color:var(--accent2); color:var(--accent2); }
  .hint-btn:disabled { opacity:0.35; cursor:not-allowed; }
  .hint-btn.used { border-color:var(--accent2); color:var(--accent2); }
  .hint-btn.reveal {
    background:var(--accent2); color:#0f0e17; border-color:var(--accent2);
    box-shadow:0 4px 16px rgba(255,217,61,0.35);
  }
  .hint-btn.reveal:hover:not(:disabled) { box-shadow:0 6px 24px rgba(255,217,61,0.55); }

  .next-row { width:100%; max-width:500px; display:flex; justify-content:center; }

  /* ══ SCREEN: 결과 ══ */
  #screen-result {
    align-items:center; justify-content:center;
    padding:40px 20px; text-align:center; gap:20px;
  }
  .result-emoji { font-size:4rem; }
  #screen-result h2 { font-family:'Black Han Sans',sans-serif; font-size:2.2rem; }
  #screen-result p { color:var(--muted); font-size:1rem; line-height:1.7; max-width:380px; }
  #screen-result .actions { display:flex; gap:12px; flex-wrap:wrap; justify-content:center; }

  /* 토스트 알림 */
  .toast {
    position:fixed; bottom:30px; left:50%; transform:translateX(-50%) translateY(20px);
    background:#2a2740; border:1px solid var(--border); border-radius:50px;
    padding:12px 24px; font-size:0.9rem; font-weight:700;
    opacity:0; transition:opacity 0.3s,transform 0.3s; pointer-events:none; z-index:999;
    white-space:nowrap;
  }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
  .toast.success { border-color:rgba(107,203,119,0.5); color:var(--accent3); }
  .toast.error   { border-color:rgba(255,107,107,0.5); color:var(--accent); }

  @media (max-width:480px) {
    .photo-card { flex-wrap:wrap; }
    .photo-card .thumb { width:100%; height:160px; border-radius:10px; }
    .game-card { flex-wrap:wrap; }
    .game-card-actions { width:100%; justify-content:flex-end; }
  }
</style>
</head>
<body>

<div class="floating-icons" id="floatingIcons"></div>
<div class="toast" id="toast"></div>

<!-- ══ 홈 ══ -->
<div id="screen-home" class="screen active">
  <p class="eyebrow">Photo Quiz Game</p>
  <h1>사진 보고<br><span>맞춰보세요!</span></h1>
  <p>사진을 업로드하고 정답을 입력하면<br>나만의 맞추기 게임이 완성돼요.</p>
  <div class="home-actions">
    <button class="btn btn-primary" onclick="goTo('list')">🗂 내 게임 목록</button>
    <button class="btn btn-secondary" onclick="newGame()">➕ 새 게임 만들기</button>
  </div>
</div>

<!-- ══ 목록 ══ -->
<div id="screen-list" class="screen">
  <h2>내 <span>게임</span> 목록</h2>
  <div class="list-wrap" id="gameList"></div>
  <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center;">
    <button class="btn btn-primary" onclick="newGame()">➕ 새 게임 만들기</button>
    <button class="btn btn-secondary" onclick="goTo('home')">← 홈으로</button>
  </div>
</div>

<!-- ══ 빌더 ══ -->
<div id="screen-builder" class="screen">
  <h2>게임 <span>만들기</span></h2>

  <div class="builder-wrap">
    <!-- 게임 제목 -->
    <div class="title-input-wrap">
      <label>제목</label>
      <input type="text" id="gameTitle" placeholder="예: 디저트 맞추기" maxlength="30">
    </div>

    <!-- 사진 드롭존 -->
    <div class="drop-zone" id="dropZone">
      <div class="dz-icon">📸</div>
      <p><strong>클릭하거나 사진을 끌어다 놓으세요</strong><br>JPG, PNG, GIF, WEBP · 여러 장 한 번에 가능</p>
    </div>
    <input type="file" id="file-input" accept="image/*" multiple>

    <div class="card-list" id="cardList"></div>

    <!-- 저장 용량 표시 -->
    <div class="storage-bar-wrap" id="storageWrap" style="display:none">
      <div class="storage-bar-label">
        <span>브라우저 저장 용량</span>
        <span id="storageText">0 / 5 MB</span>
      </div>
      <div class="storage-bar-bg">
        <div class="storage-bar-fill" id="storageBar" style="width:0%"></div>
      </div>
    </div>
  </div>

  <div class="builder-footer">
    <button class="btn btn-secondary" onclick="goTo('list')">← 목록으로</button>
    <button class="btn btn-green"   id="saveBtn"  onclick="saveGame()"  disabled>💾 저장</button>
    <button class="btn btn-primary" id="startBtn" onclick="startGame()" disabled>▶ 바로 시작</button>
  </div>
</div>

<!-- ══ 게임 ══ -->
<div id="screen-game" class="screen">
  <div class="game-header">
    <div class="progress-text">
      <span id="qNum">1</span> / <span id="qTotal">?</span>
    </div>
    <button class="btn btn-secondary btn-sm" onclick="goTo('list')">🗂 목록</button>
  </div>

  <div class="image-box" id="imageBox">
    <img id="gameImg" src="" alt="퀴즈 이미지">
  </div>

  <div class="answer-banner" id="answerBanner">
    <div class="ab-label">정답</div>
    <div class="ab-answer" id="answerText"></div>
  </div>

  <div class="hint-row">
    <button class="hint-btn" id="hint1" onclick="useHint(1)">조금 더 보기</button>
    <button class="hint-btn" id="hint2" onclick="useHint(2)" disabled>더 보기</button>
    <button class="hint-btn reveal" id="hint3" onclick="useHint(3)">🔍 전체 보기</button>
  </div>

  <div class="next-row">
    <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()" style="display:none">다음 →</button>
  </div>
</div>

<!-- ══ 결과 ══ -->
<div id="screen-result" class="screen">
  <div class="result-emoji">🎉</div>
  <h2>모두 봤어요!</h2>
  <p id="resultMsg"></p>
  <div class="actions">
    <button class="btn btn-yellow"    onclick="restartGame()">🔄 다시 보기</button>
    <button class="btn btn-secondary" onclick="goTo('list')">🗂 목록으로</button>
    <button class="btn btn-secondary" onclick="goTo('home')">🏠 홈으로</button>
  </div>
</div>

<script>
/* ════════════════════════════
   전역 상태
════════════════════════════ */
let items    = [];   // 현재 빌더 { url, answer, name }
let queue    = [];   // 셔플 인덱스
let cur      = 0;
let revealed = false;
let editingId = null;  // 수정 중인 게임 ID (null = 새 게임)

const ZOOM_LEVELS = [5.5, 3.0, 1.8, 1.0];
let zoomOffsetX = 0, zoomOffsetY = 0;

const LS_KEY = 'photoQuizGames'; // LocalStorage 키

/* ════════════════════════════
   화면 전환
════════════════════════════ */
function goTo(screen) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + screen).classList.add('active');
  window.scrollTo(0, 0);
  if (screen === 'list') renderList();
}

/* ════════════════════════════
   배경 이모지
════════════════════════════ */
(function() {
  const icons = ['📸','🎯','🌟','🎪','🦋','🍀','✨','🎨','🔍','💡'];
  const wrap = document.getElementById('floatingIcons');
  for (let i = 0; i < 18; i++) {
    const el = document.createElement('div');
    el.className = 'fi';
    el.textContent = icons[Math.floor(Math.random() * icons.length)];
    el.style.left = Math.random() * 100 + 'vw';
    el.style.animationDuration = (12 + Math.random() * 16) + 's';
    el.style.animationDelay = -(Math.random() * 20) + 's';
    el.style.fontSize = (1.2 + Math.random() * 1.8) + 'rem';
    wrap.appendChild(el);
  }
})();

/* ════════════════════════════
   토스트
════════════════════════════ */
let toastTimer;
function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type + ' show';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2400);
}

/* ════════════════════════════
   LocalStorage 헬퍼
════════════════════════════ */
function loadGames() {
  try { return JSON.parse(localStorage.getItem(LS_KEY)) || []; }
  catch { return []; }
}
function saveGames(games) {
  try {
    localStorage.setItem(LS_KEY, JSON.stringify(games));
    return true;
  } catch(e) {
    if (e.name === 'QuotaExceededError') {
      showToast('💾 저장 용량이 초과됐어요. 오래된 게임을 삭제해주세요.', 'error');
    }
    return false;
  }
}
function getStorageUsed() {
  let total = 0;
  for (let k in localStorage) {
    if (localStorage.hasOwnProperty(k)) total += (localStorage[k].length * 2);
  }
  return total; // bytes
}

/* ════════════════════════════
   목록 화면 렌더링
════════════════════════════ */
function renderList() {
  const games = loadGames();
  const wrap = document.getElementById('gameList');
  wrap.innerHTML = '';

  if (games.length === 0) {
    wrap.innerHTML = `
      <div class="list-empty">
        <div class="le-icon">🎮</div>
        <p>저장된 게임이 없어요.<br>새 게임을 만들어보세요!</p>
      </div>`;
    return;
  }

  games.forEach(g => {
    const card = document.createElement('div');
    card.className = 'game-card';
    const thumbsHtml = g.items.slice(0, 3).map(it =>
      `<img src="${it.url}" alt="">`
    ).join('');
    const dateStr = new Date(g.savedAt).toLocaleDateString('ko-KR');
    card.innerHTML = `
      <div class="game-card-thumbs">${thumbsHtml}</div>
      <div class="game-card-info">
        <div class="game-card-title">${g.title}</div>
        <div class="game-card-meta">${g.items.length}장 · ${dateStr}</div>
      </div>
      <div class="game-card-actions">
        <button class="btn btn-primary btn-sm" onclick="playGame('${g.id}')">▶ 플레이</button>
        <button class="btn btn-secondary btn-sm" onclick="editGame('${g.id}')">✏️</button>
        <button class="btn btn-danger btn-sm" onclick="deleteGame('${g.id}')">🗑</button>
      </div>
    `;
    wrap.appendChild(card);
  });
}

/* ════════════════════════════
   게임 저장
════════════════════════════ */
function saveGame() {
  const title = document.getElementById('gameTitle').value.trim();
  if (!title) { showToast('게임 제목을 입력해주세요!', 'error'); return; }
  if (items.length === 0) { showToast('사진을 추가해주세요!', 'error'); return; }
  if (!items.every(it => it.answer.trim())) { showToast('모든 사진에 정답을 입력해주세요!', 'error'); return; }

  const games = loadGames();
  const gameData = {
    id: editingId || Date.now().toString(),
    title,
    items: items.map(it => ({ url: it.url, answer: it.answer, name: it.name || '' })),
    savedAt: Date.now()
  };

  if (editingId) {
    const idx = games.findIndex(g => g.id === editingId);
    if (idx !== -1) games[idx] = gameData;
    else games.push(gameData);
  } else {
    games.push(gameData);
    editingId = gameData.id;
  }

  if (saveGames(games)) {
    showToast('✅ 저장됐어요!');
    updateStorageBar();
  }
}

/* ════════════════════════════
   새 게임 / 수정 / 삭제
════════════════════════════ */
function newGame() {
  editingId = null;
  items = [];
  document.getElementById('gameTitle').value = '';
  document.getElementById('cardList').innerHTML = '';
  document.getElementById('storageWrap').style.display = 'none';
  checkBtns();
  goTo('builder');
}

function editGame(id) {
  const games = loadGames();
  const g = games.find(g => g.id === id);
  if (!g) return;

  editingId = id;
  items = g.items.map(it => ({ url: it.url, answer: it.answer, name: it.name || '' }));
  document.getElementById('gameTitle').value = g.title;
  document.getElementById('cardList').innerHTML = '';
  items.forEach((it, i) => renderCard(it, i));
  checkBtns();
  updateStorageBar();
  goTo('builder');
}

function deleteGame(id) {
  if (!confirm('이 게임을 삭제할까요?')) return;
  const games = loadGames().filter(g => g.id !== id);
  saveGames(games);
  renderList();
  showToast('🗑 삭제됐어요.');
}

function playGame(id) {
  const games = loadGames();
  const g = games.find(g => g.id === id);
  if (!g) return;

  editingId = id;
  items = g.items.map(it => ({ url: it.url, answer: it.answer, name: it.name || '' }));
  document.getElementById('gameTitle').value = g.title;
  startGame();
}

/* ════════════════════════════
   파일 업로드
════════════════════════════ */
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('file-input');

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('drag-over');
  handleFiles(e.dataTransfer.files);
});
fileInput.addEventListener('change', () => { handleFiles(fileInput.files); fileInput.value=''; });

function handleFiles(files) {
  Array.from(files).forEach(file => {
    if (!file.type.startsWith('image/')) return;
    const reader = new FileReader();
    reader.onload = e => {
      const item = { url: e.target.result, answer: '', name: file.name };
      items.push(item);
      renderCard(item, items.length - 1);
      checkBtns();
      updateStorageBar();
    };
    reader.readAsDataURL(file);
  });
}

function renderCard(item, idx) {
  const list = document.getElementById('cardList');
  const card = document.createElement('div');
  card.className = 'photo-card';
  card.id = 'card-' + idx;
  card.innerHTML = `
    <img class="thumb" src="${item.url}" alt="">
    <div class="info">
      <div class="fname">${item.name || '사진 ' + (idx+1)}</div>
      <input type="text" placeholder="이 사진의 정답은? (예: 마카롱)"
             value="${item.answer}"
             oninput="items[${idx}].answer=this.value;checkBtns()">
    </div>
    <button class="del-btn" onclick="removeItem(${idx})" title="삭제">✕</button>
  `;
  list.appendChild(card);
}

function removeItem(idx) {
  items.splice(idx, 1);
  document.getElementById('cardList').innerHTML = '';
  items.forEach((it, i) => renderCard(it, i));
  checkBtns();
  updateStorageBar();
}

function checkBtns() {
  const ok = items.length > 0 && items.every(it => it.answer.trim() !== '');
  const hasTitle = document.getElementById('gameTitle').value.trim() !== '';
  document.getElementById('startBtn').disabled = !ok;
  document.getElementById('saveBtn').disabled  = !(ok && hasTitle);
}
document.getElementById('gameTitle').addEventListener('input', checkBtns);

function updateStorageBar() {
  if (items.length === 0) { document.getElementById('storageWrap').style.display = 'none'; return; }
  document.getElementById('storageWrap').style.display = 'block';
  const used = getStorageUsed();
  const max  = 5 * 1024 * 1024;
  const pct  = Math.min(100, (used / max) * 100);
  document.getElementById('storageText').textContent =
    `${(used/1024/1024).toFixed(1)} / 5 MB`;
  const bar = document.getElementById('storageBar');
  bar.style.width = pct + '%';
  bar.className = 'storage-bar-fill' + (pct > 85 ? ' danger' : pct > 65 ? ' warn' : '');
}

/* ════════════════════════════
   게임 시작 / 재시작
════════════════════════════ */
function startGame() {
  queue = items.map((_, i) => i);
  shuffle(queue);
  cur = 0;
  document.getElementById('qTotal').textContent = queue.length;
  goTo('game');
  loadQuestion();
}

function restartGame() {
  shuffle(queue);
  cur = 0;
  goTo('game');
  loadQuestion();
}

/* ════════════════════════════
   문제 로드
════════════════════════════ */
function loadQuestion() {
  revealed = false;
  const item = items[queue[cur]];

  document.getElementById('qNum').textContent = cur + 1;
  document.getElementById('answerBanner').classList.remove('visible');
  document.getElementById('nextBtn').style.display = 'none';

  zoomOffsetX = (Math.random() - 0.5) * 36;
  zoomOffsetY = (Math.random() - 0.5) * 36;

  const img = document.getElementById('gameImg');
  img.style.transition = 'none';
  img.style.objectFit = 'cover';
  img.style.width = 'auto';
  img.style.height = 'auto';
  img.src = item.url;
  img.onload = () => {
    img.style.transformOrigin = '50% 50%';
    // translate(-50%,-50%)로 중앙 고정 + 랜덤 offset을 추가 translate로 표현
    // CSS translate 속성은 transform과 별도라 덮어쓰지 않음
    const ox = zoomOffsetX * 1.5; // px 단위 offset (박스 크기 대비 %)
    const oy = zoomOffsetY * 1.5;
    img.style.transform = `scale(${ZOOM_LEVELS[0]}) translate(${ox}px, ${oy}px)`;
    requestAnimationFrame(() => {
      img.style.transition = 'transform 0.9s cubic-bezier(0.4,0,0.2,1)';
    });
  };

  document.getElementById('hint1').disabled = false;
  document.getElementById('hint1').classList.remove('used');
  document.getElementById('hint2').disabled = true;
  document.getElementById('hint2').classList.remove('used');
  document.getElementById('hint3').disabled = false;
  document.getElementById('hint3').classList.remove('used');
}

/* ════════════════════════════
   힌트 / 전체보기
════════════════════════════ */
function useHint(level) {
  if (level === 3 && revealed) return;
  const img = document.getElementById('gameImg');
  const s = ZOOM_LEVELS[level];

  if (s === 1.0) {
    img.style.transformOrigin = '50% 50%';
    img.style.transform = 'scale(1)';  // translate는 CSS translate(-50%,-50%) 유지
    img.style.objectFit = 'contain';
    img.style.width = '100%';
    img.style.height = '100%';
    revealAnswer();
  } else {
    const ox = zoomOffsetX * 1.5;
    const oy = zoomOffsetY * 1.5;
    img.style.transform = `scale(${s}) translate(${ox}px, ${oy}px)`;
  }

  document.getElementById('hint' + level).classList.add('used');
  document.getElementById('hint' + level).disabled = true;

  if (level < 3) {
    document.getElementById('hint' + (level + 1)).disabled = false;
    document.getElementById('hint3').disabled = false;
  }
}

function revealAnswer() {
  revealed = true;
  document.getElementById('answerText').textContent = items[queue[cur]].answer;
  document.getElementById('answerBanner').classList.add('visible');
  ['hint1','hint2','hint3'].forEach(id => document.getElementById(id).disabled = true);
  const nextBtn = document.getElementById('nextBtn');
  nextBtn.textContent = cur >= queue.length - 1 ? '결과 보기 🎉' : '다음 →';
  nextBtn.style.display = 'inline-flex';
}

/* ════════════════════════════
   다음 / 결과
════════════════════════════ */
function nextQuestion() {
  cur++;
  if (cur >= queue.length) showResult();
  else loadQuestion();
}

function showResult() {
  goTo('result');
  document.getElementById('resultMsg').textContent = `${queue.length}장의 사진을 모두 확인했어요!`;
}

/* ════════════════════════════
   유틸
════════════════════════════ */
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}
</script>
